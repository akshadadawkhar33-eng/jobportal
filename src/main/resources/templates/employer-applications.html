<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidates - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f3f2ef; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #004182;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/employer/dashboard">← Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="fw-bold mb-4">Applicants for this Role</h2>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="bg-light text-muted">
                    <tr>
                        <th class="p-3">Applicant Name</th>
                        <th class="p-3">Email Contact</th>
                        <th class="p-3">Applied On</th>
                        <th class="p-3 text-end">Resume</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="4" class="text-center p-5 text-muted fw-bold">No applications received yet.</td>
                    </tr>
                    <tr th:each="app : ${applications}">
                        <td class="p-3 fw-bold text-dark" th:text="${app.seeker.name}">Name</td>
                        <td class="p-3" th:text="${app.seeker.email}">Email</td>
                        <td class="p-3" th:text="${#calendars.format(app.appliedDate, 'MMM dd, yyyy')}">Date</td>
                        <td class="p-3 text-end">
                            <span th:if="${app.seeker.resumeLink == null or app.seeker.resumeLink.isEmpty()}" class="text-muted small">Not provided</span>
                            <a th:if="${app.seeker.resumeLink != null and !app.seeker.resumeLink.isEmpty()}" 
                               th:href="${app.seeker.resumeLink}" target="_blank" class="btn btn-sm btn-outline-primary fw-bold">View Resume</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
