<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Browse Jobs - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f2ef; }
        .job-card { transition: transform 0.2s; border-left: 4px solid transparent; }
        .job-card:hover { transform: translateY(-5px); border-left: 4px solid #0a66c2; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" style="color:#0a66c2" href="/">JobPortal</a>
        <div class="ms-auto" sec:authorize="isAuthenticated()">
            <a href="/dashboard" class="btn btn-outline-primary fw-bold">My Dashboard</a>
        </div>
        <div class="ms-auto" sec:authorize="!isAuthenticated()">
            <a href="/login" class="btn btn-outline-primary fw-bold me-2">Sign In</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-8 mx-auto">
            <h2 class="fw-bold mb-3">Explore Opportunities</h2>
            <form action="/jobs" method="get" class="d-flex">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2 form-control-lg shadow-sm border-0" placeholder="Search by job title, skill, or company">
                <button type="submit" class="btn btn-primary btn-lg fw-bold px-4" style="background-color: #0a66c2;">Search</button>
            </form>
            <div th:if="${param.applied}" class="alert alert-success mt-4 mb-0 fw-bold border-0 shadow-sm">✅ Application submitted successfully! Employers will review it shortly.</div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8 mx-auto">
            <div th:if="${#lists.isEmpty(jobs)}" class="text-center p-5 bg-white rounded shadow-sm">
                <h4 class="text-muted fw-bold">No jobs found matching your criteria.</h4>
            </div>
            
            <div th:each="job : ${jobs}" class="card shadow-sm border-0 mb-3 job-card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h4 class="fw-bold text-dark mb-1" th:text="${job.title}">Job Title</h4>
                            <h6 class="text-muted mb-2 fw-bold" th:text="${job.employer.companyName}">Company Name</h6>
                            <div class="text-muted small mb-3">
                                <span class="me-3 fw-bold">📍 <span th:text="${job.location}">Location</span></span>
                                <span class="fw-bold">💰 <span th:text="${job.salary}">Salary</span></span>
                            </div>
                        </div>
                        <div sec:authorize="hasRole('SEEKER')">
                            <form th:action="@{/seeker/apply/{id}(id=${job.id})}" method="post">
                                <button type="submit" class="btn btn-primary fw-bold rounded-pill px-4" style="background-color: #0a66c2;">Easy Apply</button>
                            </form>
                        </div>
                    </div>
                    <hr class="text-muted">
                    <p class="card-text text-secondary mb-3" style="white-space: pre-wrap;" th:text="${job.description}">Description...</p>
                    <div class="text-end">
                        <small class="text-muted fw-bold">Posted on <span th:text="${#calendars.format(job.postedDate, 'MMM dd, yyyy')}">Date</span></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
