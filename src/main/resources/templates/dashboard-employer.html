<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employer Dashboard - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f3f2ef; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #004182;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">JobPortal Employer Hub</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white me-3 fw-bold" th:text="${#authentication.name}">Username</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-sm btn-outline-light fw-bold">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2 class="fw-bold">Your Job Postings</h2>
        </div>
        <div class="col text-end">
            <a href="/employer/job/new" class="btn btn-primary btn-lg fw-bold" style="background-color: #0a66c2;">+ Post New Job</a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="bg-light text-muted">
                    <tr>
                        <th class="p-3">Job Title</th>
                        <th class="p-3">Location</th>
                        <th class="p-3">Posted Date</th>
                        <th class="p-3 text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(jobs)}">
                        <td colspan="4" class="text-center p-5 text-muted fw-bold">You haven't posted any jobs yet.</td>
                    </tr>
                    <tr th:each="job : ${jobs}">
                        <td class="p-3 fw-bold" th:text="${job.title}">Title</td>
                        <td class="p-3" th:text="${job.location}">Location</td>
                        <td class="p-3" th:text="${#calendars.format(job.postedDate, 'MMM dd, yyyy')}">Date</td>
                        <td class="p-3 text-end">
                            <a th:href="@{/employer/applications/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary fw-bold">View Applicants</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
