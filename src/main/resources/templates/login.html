<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f3f2ef; }</style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 mt-5">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold" style="color: #0a66c2;">Sign in</h2>
                    <p class="text-center text-muted mb-4">Stay updated on your professional world</p>
                    <div th:if="${param.error}" class="alert alert-danger text-center">Invalid Email or Password.</div>
                    <div th:if="${param.registered}" class="alert alert-success text-center">Registration successful. Please login.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Email address</label>
                            <input type="email" name="username" class="form-control form-control-lg" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" style="background-color: #0a66c2;">Sign in</button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted">New to JobPortal? <a href="/register" class="text-decoration-none fw-bold">Join now</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
