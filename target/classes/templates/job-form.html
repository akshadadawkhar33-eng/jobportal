<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post a Job - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f3f2ef; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #004182;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/employer/dashboard">← Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4" style="color: #0a66c2;">Post a New Job</h2>
                    <form th:action="@{/employer/job/post}" th:object="${jobPost}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted">Job Title</label>
                            <input type="text" th:field="*{title}" class="form-control form-control-lg bg-light border-0" placeholder="e.g. Senior Software Engineer" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Location</label>
                                <input type="text" th:field="*{location}" class="form-control form-control-lg bg-light border-0" placeholder="e.g. Remote, New York" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Salary Range</label>
                                <input type="text" th:field="*{salary}" class="form-control form-control-lg bg-light border-0" placeholder="e.g. $100k - $120k">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Job Description</label>
                            <textarea th:field="*{description}" class="form-control bg-light border-0" rows="8" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" style="background-color: #0a66c2;">Publish Job Post</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
