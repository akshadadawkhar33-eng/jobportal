<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Applications - JobPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f3f2ef; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" style="color: #0a66c2;" href="/">JobPortal</a>
        <div class="ms-auto d-flex align-items-center">
            <a href="/jobs" class="btn btn-outline-primary fw-bold me-3">Find Jobs</a>
            <span class="text-muted me-3 fw-bold" th:text="${#authentication.name}">Username</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-sm btn-outline-danger fw-bold">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="fw-bold mb-4">My Submitted Applications</h2>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="bg-light text-muted">
                    <tr>
                        <th class="p-3">Job Title</th>
                        <th class="p-3">Company</th>
                        <th class="p-3">Applied Date</th>
                        <th class="p-3">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="4" class="text-center p-5 text-muted fw-bold">You haven't applied to any jobs yet. <br><a href="/jobs" class="mt-2 text-decoration-none">Start browsing now</a></td>
                    </tr>
                    <tr th:each="app : ${applications}">
                        <td class="p-3 fw-bold text-dark" th:text="${app.jobPost.title}">Title</td>
                        <td class="p-3 text-muted fw-bold" th:text="${app.jobPost.employer.companyName}">Company</td>
                        <td class="p-3" th:text="${#calendars.format(app.appliedDate, 'MMM dd, yyyy')}">Date</td>
                        <td class="p-3">
                            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold" th:if="${app.status == 'PENDING'}">Under Review</span>
                            <span class="badge bg-success px-3 py-2 rounded-pill fw-bold" th:if="${app.status == 'ACCEPTED'}">Accepted</span>
                            <span class="badge bg-danger px-3 py-2 rounded-pill fw-bold" th:if="${app.status == 'REJECTED'}">Not Selected</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
